name = "echo-autonomous-builder"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "echo-autonomous-builder"
database_id = "c7e986ee-7b41-42ee-96b0-188abdf3e294"

[[kv_namespaces]]
binding = "CACHE"
id = "1714cf3a143e46f0aca7e8bc6ea7d060"

[vars]
WORKER_VERSION = "3.3.0"
CLOUDFLARE_ACCOUNT_ID = "b9af3a4bf161132bb7e5d3d365fb8bb0"

# Service bindings for worker-to-worker communication
[[services]]
binding = "SVC_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "SVC_ENGINE"
service = "echo-engine-runtime"

[[services]]
binding = "SVC_DAEMON"
service = "echo-autonomous-daemon"

[[services]]
binding = "SVC_QA"
service = "echo-qa-tester"

[[services]]
binding = "SVC_CHAT"
service = "echo-chat"

[[services]]
binding = "SVC_KNOWLEDGE"
service = "echo-knowledge-forge"

[[services]]
binding = "SVC_SPEAK"
service = "echo-speak-cloud"

[[services]]
binding = "SVC_DOCTRINE"
service = "echo-doctrine-forge"

[[services]]
binding = "SVC_SDK"
service = "echo-sdk-gateway"

[[services]]
binding = "SVC_VAULT"
service = "echo-vault-api"

[[services]]
binding = "SVC_ORCHESTRATOR"
service = "echo-build-orchestrator"

[[services]]
binding = "SVC_SWARM"
service = "echo-swarm-brain"

[[services]]
binding = "SVC_ANALYTICS"
service = "echo-analytics-engine"

[[services]]
binding = "SVC_ARCANUM"
service = "echo-arcanum"

[[services]]
binding = "SVC_GS343"
service = "echo-gs343-cloud"

[[services]]
binding = "SVC_CRM"
service = "echo-crm"

[[services]]
binding = "SVC_HELPDESK"
service = "echo-helpdesk"

[[services]]
binding = "SVC_XBOT"
service = "echo-x-bot"

[[services]]
binding = "SVC_LINKEDIN"
service = "echo-linkedin"

[[services]]
binding = "SVC_TELEGRAM"
service = "echo-telegram"

[[services]]
binding = "SVC_REDDIT"
service = "echo-reddit-bot"

[[services]]
binding = "SVC_OMNISYNC"
service = "omniscient-sync"

[[services]]
binding = "SVC_HOME"
service = "echo-home-ai"

[[services]]
binding = "SVC_SHEPHERD"
service = "echo-shepherd-ai"

[[services]]
binding = "SVC_CALLCENTER"
service = "echo-call-center"

[[services]]
binding = "SVC_DIAGNOSTICS"
service = "echo-diagnostics-agent"

# ═══ Missing CRITICAL_WORKERS bindings (2026-03-28 CC10) ═══
# These 13 workers were in CRITICAL_WORKERS but had no service binding,
# causing 13/34 warmup failures every cycle (same-account routing bug).
[[services]]
binding = "SVC_BOOKING"
service = "echo-booking"

[[services]]
binding = "SVC_INVOICE"
service = "echo-invoice"

[[services]]
binding = "SVC_LIVECHAT"
service = "echo-live-chat"

[[services]]
binding = "SVC_PAYROLL"
service = "echo-payroll"

[[services]]
binding = "SVC_RECRUITING"
service = "echo-recruiting"

[[services]]
binding = "SVC_EMAIL"
service = "echo-email-sender"

[[services]]
binding = "SVC_REPORTGEN"
service = "echo-report-generator"

[[services]]
binding = "SVC_FORMS"
service = "echo-forms"

[[services]]
binding = "SVC_PM"
service = "echo-project-manager"

[[services]]
binding = "SVC_HR"
service = "echo-hr"

[[services]]
binding = "SVC_CALENDAR"
service = "echo-calendar"

[[services]]
binding = "SVC_WORKFLOW"
service = "echo-workflow-automation"

[[services]]
binding = "SVC_FINANCE"
service = "echo-finance-ai"
